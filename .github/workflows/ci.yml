name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-go v6.4.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Test
        run: make test

      # golangci/golangci-lint-action v9.2.0
      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          # v2.12.1 is built with go1.26 to match this repo's toolchain.
          # Older releases (<= v2.1.x) are built with go1.24 and refuse to
          # load configs whose go directive is newer than their build.
          version: v2.12.1
          args: --timeout=5m

      - name: Convention tests
        run: go test ./internal/cmd/ -run Conventions -count=1
  release-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install and configure PMG
        uses: safedep/pmg@7b13b6bfb3cdb8cde1212e7a0e8788b22bf2081e # v0.21.2
        with:
          server-mode: true
          api-key: ${{ secrets.SAFEDEP_CLOUD_API_KEY }}
          tenant-id: ${{ secrets.SAFEDEP_CLOUD_TENANT_DOMAIN }}
          endpoint-id: CICD_GHA_SAFEDEP_CLI

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          install-only: true
          version: "~> v2"

      - name: Release preflight
        run: pnpm nx run safedep-cli:release-preflight

      - name: Stop PMG proxy
        if: always()
        run: pmg proxy stop --fail-on-violation
