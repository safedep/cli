version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/safedep
    binary: safedep
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -s -w
      - -X github.com/safedep/cli/internal/version.Version={{.Version}}
      - -X github.com/safedep/cli/internal/version.Commit={{.Commit}}

universal_binaries:
  - name_template: safedep
    replace: true

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

homebrew_casks:
  - name: cli
    directory: Casks
    homepage: https://github.com/safedep/cli
    description: "The SafeDep Platform CLI"
    binaries:
      - safedep
    url:
      verified: github.com/safedep/cli
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/safedep"]
          end
    repository:
      owner: safedep
      name: homebrew-tap
      branch: main
