version: "2"

linters:
  default: standard
  enable:
    - gocritic
    - misspell
    - revive
    - copyloopvar
    - errorlint
    - gosec

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G304  # file path from variable: intentional in MCP config reader

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclusions:
    rules:
      - linters: [gocritic]
        text: "hugeParam"
